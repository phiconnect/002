<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shoulder">
<meta name="theme-color" content="#15573a">
<title>Shoulder Sessions — Golf</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap');
  :root{--green:#15573a;--green-d:#0f4530;--green-l:#2e7d52;--amber:#e08a1e;--ink:#1f2a26;--muted:#6b7a72;--line:#e2eae5;--paper:#f3f6f4;--card:#fff;--p1:#2f7d8c;--p2:#2e7d52;--p3:#d97316;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--paper);color:var(--ink);font-family:'Sarabun',system-ui,sans-serif;line-height:1.5;}
  body{max-width:540px;margin:0 auto;padding-bottom:120px;}
  .mono{font-family:'Space Grotesk','Sarabun',monospace;font-variant-numeric:tabular-nums;}
  header{background:var(--green);color:#fff;padding:20px 18px 16px;border-radius:0 0 22px 22px;position:relative;overflow:hidden;}
  header::after{content:"⛳";position:absolute;right:-6px;top:-14px;font-size:96px;opacity:.08;transform:rotate(8deg);}
  .eyebrow{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--amber);font-weight:700;}
  h1{font-size:23px;font-weight:700;line-height:1.12;margin-top:3px;}
  h1 small{display:block;font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:12px;letter-spacing:.5px;opacity:.85;margin-top:4px;}
  .seg{display:flex;gap:6px;background:#e8efeb;border-radius:13px;padding:5px;margin:13px 14px 2px;}
  .seg button{flex:1;border:none;background:transparent;color:var(--muted);font-family:'Sarabun',sans-serif;font-weight:700;font-size:13px;padding:9px;border-radius:9px;cursor:pointer;transition:.15s;}
  .seg button.on{background:#fff;color:var(--green);box-shadow:0 1px 4px rgba(0,0,0,.08);}
  .tabs{display:flex;gap:8px;padding:12px 14px 4px;}
  .tab{flex:1;background:var(--card);color:var(--muted);border:1.5px solid var(--line);border-radius:13px;padding:9px 4px;font-family:'Sarabun',sans-serif;font-weight:700;font-size:12.5px;cursor:pointer;transition:.18s;text-align:center;line-height:1.2;}
  .tab small{display:block;font-weight:500;font-size:9.5px;opacity:.8;margin-top:2px;}
  .tab[data-p="1"].on{background:var(--p1);border-color:var(--p1);color:#fff;}
  .tab[data-p="2"].on{background:var(--p2);border-color:var(--p2);color:#fff;}
  .tab[data-p="3"].on{background:var(--p3);border-color:var(--p3);color:#fff;}
  .prog{display:flex;align-items:center;gap:14px;margin:12px 14px 6px;background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:13px 16px;}
  .ring{width:54px;height:54px;flex:0 0 54px;}
  .prog .pinfo b{font-size:14.5px;color:var(--green);}
  .prog .pinfo p{font-size:12px;color:var(--muted);}
  .resetday{margin-left:auto;border:1.5px solid var(--line);background:var(--card);color:var(--muted);border-radius:10px;padding:7px 11px;font-family:'Sarabun',sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
  .resetday:active{background:var(--paper);}
  .intro{margin:8px 14px;font-size:12.5px;color:var(--muted);background:#eef3f0;border-radius:12px;padding:10px 13px;}
  .intro b{color:var(--ink);}
  .group{margin:14px 14px 0;}
  .group h2{font-size:12px;letter-spacing:.4px;color:var(--green);font-weight:700;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
  .group h2::before{content:"";width:7px;height:7px;border-radius:2px;background:var(--amber);flex:0 0 auto;}
  .ex{display:flex;align-items:center;gap:12px;background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:11px 13px;margin-bottom:9px;cursor:pointer;transition:.15s;user-select:none;}
  .ex:active{transform:scale(.992);}
  .thumb{flex:0 0 50px;width:50px;height:42px;background:#f1f6f3;border:1px solid #e4eee8;border-radius:10px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
  .figsvg{width:48px;height:38px;}
  .figsvg .ln{fill:none;stroke:#15573a;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;}
  .figsvg .eq{fill:none;stroke:#9aa7a0;stroke-width:2.2;stroke-linecap:round;}
  .figsvg .fl{stroke:#c5d6cc;stroke-width:2.4;}
  .figsvg .am{fill:none;stroke:#e08a1e;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round;}
  .figsvg .amf{fill:#e08a1e;}
  .figsvg .hd{fill:#eaf2ed;stroke:#15573a;stroke-width:2.2;}
  .figsvg .dot{fill:#15573a;}
  .badge{position:absolute;top:0;right:0;width:18px;height:18px;border-radius:0 9px 0 9px;background:var(--green-l);display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.4);transition:.15s;}
  .badge svg{width:11px;height:11px;}
  .ex .body{flex:1;min-width:0;}
  .ex .en{font-weight:700;font-size:14px;color:var(--ink);line-height:1.2;}
  .ex .th{font-size:11px;color:var(--muted);margin-top:1px;}
  .reps{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:12.5px;color:var(--green);white-space:nowrap;flex:0 0 auto;text-align:right;}
  .star{color:var(--amber);font-weight:700;}
  .ex.done{background:#f0f6f2;border-color:#cfe6da;}
  .ex.done .badge{opacity:1;transform:scale(1);}
  .ex.done .en{color:var(--muted);text-decoration:line-through;text-decoration-color:#bcd0c5;}
  .ex.done .reps{color:#a9bdb1;}
  .ex.done .thumb{opacity:.55;}
  /* schedule */
  .wkcard{display:flex;align-items:center;gap:11px;background:var(--card);border:1.5px solid var(--line);border-left:4px solid var(--pc);border-radius:13px;padding:11px 13px;margin:0 14px 9px;transition:.15s;}
  .wknum{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;color:var(--pc);flex:0 0 auto;min-width:30px;}
  .wkbody{flex:1;min-width:0;}
  .wktop{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
  .wkload{font-size:12.5px;font-weight:700;color:var(--ink);}
  .dtag{font-size:9px;font-weight:700;letter-spacing:.5px;color:#c2680f;background:#fff3e3;border:1px solid #f0d9bd;padding:1px 7px;border-radius:20px;}
  .wknote{font-size:11.5px;color:var(--muted);margin-top:1px;}
  .wkdots{display:flex;align-items:center;gap:6px;flex:0 0 auto;}
  .dotbtn{width:20px;height:20px;border-radius:50%;border:2px solid #c8d4cd;background:#fff;cursor:pointer;padding:0;transition:.15s;}
  .dotbtn.on{background:var(--pc);border-color:var(--pc);}
  .dotbtn:active{transform:scale(.9);}
  .wkcount{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:var(--muted);margin-left:3px;min-width:26px;text-align:right;}
  .wkcard.wkdone{background:#f0f6f2;}
  .dock{position:fixed;left:0;right:0;bottom:0;z-index:30;}
  .dock-inner{max-width:540px;margin:0 auto;padding:0 14px 14px;}
  .timer{background:var(--green-d);color:#fff;border-radius:18px;padding:13px 15px;box-shadow:0 8px 30px rgba(15,69,48,.32);display:flex;align-items:center;gap:14px;}
  .tcount{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:30px;letter-spacing:1px;min-width:84px;text-align:center;}
  .tcount.run{color:var(--amber);}
  .tpresets{display:flex;gap:6px;flex:1;flex-wrap:wrap;}
  .tp{border:1.5px solid rgba(255,255,255,.28);background:rgba(255,255,255,.06);color:#fff;border-radius:10px;padding:7px 0;flex:1;min-width:46px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:.15s;}
  .tp:active{background:rgba(255,255,255,.2);}
  .tctrl{border:none;background:var(--amber);color:#241500;border-radius:11px;width:48px;height:48px;flex:0 0 48px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .tlabel{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;opacity:.7;margin-bottom:2px;font-weight:700;}
  .flash{animation:flash .5s ease 3;}
  @keyframes flash{50%{background:var(--amber);color:var(--green-d);}}
  footer{font-size:11px;color:var(--muted);text-align:center;padding:18px 24px 4px;line-height:1.5;}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>
<body>
  <header>
    <div class="eyebrow">Golf Performance · 12 สัปดาห์</div>
    <h1>เสริมแข็งแรงหัวไหล่<small>SHOULDER SESSIONS · STABILITY → STRENGTH → POWER</small></h1>
  </header>

  <div class="seg" id="seg">
    <button class="on" data-m="w">ฝึกวันนี้</button>
    <button data-m="s">ตาราง 12 สัปดาห์</button>
  </div>

  <div id="viewWorkout">
    <div class="tabs" id="tabs">
      <button class="tab on" data-p="1">PHASE 1<small>สัปดาห์ 1–4</small></button>
      <button class="tab" data-p="2">PHASE 2<small>สัปดาห์ 5–8</small></button>
      <button class="tab" data-p="3">PHASE 3<small>สัปดาห์ 9–12</small></button>
    </div>
    <div class="prog">
      <svg class="ring" viewBox="0 0 36 36" aria-hidden="true">
        <circle cx="18" cy="18" r="15.5" fill="none" stroke="#e6efe9" stroke-width="4"/>
        <circle id="ringFg" cx="18" cy="18" r="15.5" fill="none" stroke="#2e7d52" stroke-width="4" stroke-linecap="round" stroke-dasharray="97.4" stroke-dashoffset="97.4" transform="rotate(-90 18 18)"/>
        <text id="ringTxt" x="18" y="22" text-anchor="middle" font-size="10" fill="#15573a" font-family="Space Grotesk, sans-serif" font-weight="700">0%</text>
      </svg>
      <div class="pinfo"><b id="progCount">0 / 0 ท่า</b><p id="progLabel">เซสชันวันนี้</p></div>
      <button class="resetday" id="resetDay">ล้างวันนี้</button>
    </div>
    <div class="intro" id="intro"></div>
    <div id="content"></div>
  </div>

  <div id="viewSchedule" style="display:none">
    <div id="sched"></div>
  </div>

  <footer>แตะที่ท่า/จุดเพื่อทำเครื่องหมายว่าเสร็จ · ความคืบหน้าถูกบันทึกอัตโนมัติ<br>คู่มือนี้เป็นโปรแกรมตัวอย่าง ไม่ใช่คำแนะนำทางการแพทย์ — ปรับร่วมกับโค้ช</footer>

  <div class="dock"><div class="dock-inner"><div class="timer">
    <div><div class="tlabel">พัก</div><div class="tcount mono" id="tcount">1:00</div></div>
    <div class="tpresets">
      <button class="tp" data-s="30">30s</button><button class="tp" data-s="60">60s</button>
      <button class="tp" data-s="90">90s</button><button class="tp" data-s="120">2m</button>
    </div>
    <button class="tctrl" id="tctrl" aria-label="เริ่ม/หยุดพัก">▶</button>
  </div></div></div>

/* ---------- persistence (localStorage + in-memory fallback) ---------- */
const KEY='golf_shoulder_progress', KEY2='golf_shoulder_weeks';
let progress={1:{},2:{},3:{}}, weeks={};
const _mem={};
const store={
  get(k){ try{return localStorage.getItem(k);}catch(e){ return (k in _mem)?_mem[k]:null; } },
  set(k,v){ try{localStorage.setItem(k,v);}catch(e){ _mem[k]=v; } }
};
function load(){
  try{const r=store.get(KEY); if(r)progress={...progress,...JSON.parse(r)};}catch(e){}
  try{const r=store.get(KEY2); if(r)weeks=JSON.parse(r);}catch(e){}
}
function save(){ store.set(KEY,JSON.stringify(progress)); }
function save2(){ store.set(KEY2,JSON.stringify(weeks)); }

/* ---------- workout view ---------- */
let cur=1;
const content=document.getElementById('content'), intro=document.getElementById('intro');
const ringFg=document.getElementById('ringFg'), ringTxt=document.getElementById('ringTxt');
const C=2*Math.PI*15.5; ringFg.setAttribute('stroke-dasharray',C.toFixed(1));
function idFor(gi,ii){return cur+'-'+gi+'-'+ii;}
function render(){
  const d=DATA[cur];
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',+t.dataset.p===cur));
  ringFg.setAttribute('stroke',d.color); ringTxt.setAttribute('fill',d.color);
  intro.innerHTML=d.intro;
  let html='';
  d.groups.forEach((g,gi)=>{
    html+='<div class="group"><h2>'+g.h+'</h2>';
    g.items.forEach((it,ii)=>{
      const id=idFor(gi,ii), done=!!progress[cur][id];
      const star=it[1].includes('★')?'<span class="star">★</span> ':'';
      const th=it[1]?'<div class="th">'+star+it[1].replace('★','').trim()+'</div>':'';
      const fig=FIG[it[3]]||'';
      html+='<div class="ex'+(done?' done':'')+'" data-id="'+id+'"><div class="thumb">'+fig+'<div class="badge">'+CHECK+'</div></div><div class="body"><div class="en">'+it[0]+'</div>'+th+'</div><div class="reps">'+it[2]+'</div></div>';
    });
    html+='</div>';
  });
  content.innerHTML=html;
  content.querySelectorAll('.ex').forEach(el=>el.addEventListener('click',()=>{
    const id=el.dataset.id; progress[cur][id]=!progress[cur][id];
    el.classList.toggle('done',progress[cur][id]);
    if(progress[cur][id]&&navigator.vibrate)navigator.vibrate(12);
    updateRing(); save();
  }));
  updateRing();
}
function updateRing(){
  const d=DATA[cur]; let total=0,done=0;
  d.groups.forEach((g,gi)=>g.items.forEach((it,ii)=>{total++; if(progress[cur][idFor(gi,ii)])done++;}));
  const pct=total?Math.round(done/total*100):0;
  ringFg.setAttribute('stroke-dashoffset',(C*(1-(total?done/total:0))).toFixed(1));
  ringTxt.textContent=pct+'%';
  document.getElementById('progCount').textContent=done+' / '+total+' ท่า';
  document.getElementById('progLabel').textContent=pct===100?'เสร็จครบแล้ว 💪':'เซสชัน Phase '+cur;
}
document.getElementById('tabs').addEventListener('click',e=>{const t=e.target.closest('.tab'); if(!t)return; cur=+t.dataset.p; render(); window.scrollTo({top:0,behavior:'smooth'});});
document.getElementById('resetDay').addEventListener('click',()=>{progress[cur]={}; render(); save();});

/* ---------- schedule view ---------- */
const sched=document.getElementById('sched');
const PLBL={1:'PHASE 1 · Foundation',2:'PHASE 2 · Strength',3:'PHASE 3 · Power'};
const PRNG={1:'สัปดาห์ 1–4',2:'สัปดาห์ 5–8',3:'สัปดาห์ 9–12'};
function renderSchedule(){
  let html='<div class="intro">ความถี่หลัก <b>3 ครั้ง/สัปดาห์</b> · เว้น 48 ชม. (เช่น จ–พ–ศ) · สัปดาห์ <b>deload</b> ลดเหลือ 2 ครั้งเพื่อฟื้นตัว · ช่วงแข่งลดเป็น maintenance และเว้น 48 ชม. ก่อนลงสนาม</div>';
  let lastP=0;
  WEEKS.forEach(w=>{
    if(w.p!==lastP){ lastP=w.p;
      html+='<div class="group"><h2>'+PLBL[w.p]+'<span style="margin-left:auto;font-weight:500;color:#9aa7a0;font-size:11px;letter-spacing:0;text-transform:none">'+PRNG[w.p]+'</span></h2></div>';
    }
    const arr=weeks[w.wk]||Array(w.freq).fill(false);
    const cnt=arr.filter(Boolean).length;
    let dots='';
    for(let i=0;i<w.freq;i++) dots+='<button class="dotbtn'+(arr[i]?' on':'')+'" data-wk="'+w.wk+'" data-i="'+i+'" aria-label="เซสชัน '+(i+1)+'"></button>';
    html+='<div class="wkcard'+(cnt>=w.freq?' wkdone':'')+'" style="--pc:'+PCOL[w.p]+'">'+
      '<div class="wknum">W'+w.wk+'</div>'+
      '<div class="wkbody"><div class="wktop"><span class="wkload">'+w.load+'</span>'+(w.deload?'<span class="dtag">DELOAD</span>':'')+'</div><div class="wknote">'+w.note+'</div></div>'+
      '<div class="wkdots">'+dots+'<span class="wkcount" id="wc'+w.wk+'">'+cnt+'/'+w.freq+'</span></div>'+
      '</div>';
  });
  sched.innerHTML=html;
  sched.querySelectorAll('.dotbtn').forEach(d=>d.addEventListener('click',()=>{
    const wk=+d.dataset.wk, i=+d.dataset.i, f=WEEKS.find(x=>x.wk===wk).freq;
    if(!weeks[wk]) weeks[wk]=Array(f).fill(false);
    weeks[wk][i]=!weeks[wk][i];
    d.classList.toggle('on',weeks[wk][i]);
    const cnt=weeks[wk].filter(Boolean).length;
    document.getElementById('wc'+wk).textContent=cnt+'/'+f;
    d.closest('.wkcard').classList.toggle('wkdone',cnt>=f);
    if(weeks[wk][i]&&navigator.vibrate)navigator.vibrate(12);
    save2();
  }));
}

/* ---------- mode switch ---------- */
const segBtns=document.querySelectorAll('#seg button');
function setMode(m){
  document.getElementById('viewWorkout').style.display=m==='w'?'block':'none';
  document.getElementById('viewSchedule').style.display=m==='s'?'block':'none';
  segBtns.forEach(b=>b.classList.toggle('on',b.dataset.m===m));
  if(m==='s') renderSchedule();
  window.scrollTo({top:0,behavior:'smooth'});
}
segBtns.forEach(b=>b.addEventListener('click',()=>setMode(b.dataset.m)));

/* ---------- rest timer ---------- */
let dur=60,left=60,tid=null,running=false;
const tcount=document.getElementById('tcount'), tctrl=document.getElementById('tctrl'), timerEl=document.querySelector('.timer');
function fmt(s){return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function paint(){tcount.textContent=fmt(left);}
function setDur(s){dur=s;left=s;running=false;clearInterval(tid);tctrl.textContent='▶';tcount.classList.remove('run');paint();}
function tick(){left--;paint(); if(left<=0){clearInterval(tid);running=false;tctrl.textContent='▶';tcount.classList.remove('run');left=dur;timerEl.classList.add('flash');if(navigator.vibrate)navigator.vibrate([120,60,120]);setTimeout(()=>{timerEl.classList.remove('flash');paint();},1600);}}
tctrl.addEventListener('click',()=>{ if(running){running=false;clearInterval(tid);tctrl.textContent='▶';tcount.classList.remove('run');} else{running=true;tctrl.textContent='❚❚';tcount.classList.add('run');tid=setInterval(tick,1000);} });
document.querySelectorAll('.tp').forEach(b=>b.addEventListener('click',()=>setDur(+b.dataset.s)));

load(); render(); paint();
</script>
