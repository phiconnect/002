<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MK Asia Camp 2026 — Ops Handout</title>
<style>
:root{--accent:#F58220;--accent2:#d96a10;--ink:#2b2b2b;--mut:#6b7280;--line:#e7e7e7;--card:#fff;--bg:#f5f6f8;
--need:#fff4d6;--needln:#f0b429;--acad:#fde4d3;--acadln:#e07b39;--std:#e3f3e8;--stdln:#3a9d5d;}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans Thai",Arial,sans-serif;
background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
header.top{position:sticky;top:0;z-index:20;background:linear-gradient(95deg,var(--accent),var(--accent2));color:#fff;
padding:12px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.12)}
header.top h1{font-size:17px;margin:0;font-weight:700;letter-spacing:.2px}
header.top .sub{font-size:12px;opacity:.9;margin-top:2px}
.tabs{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.tab{background:rgba(255,255,255,.16);color:#fff;border:none;padding:8px 14px;border-radius:8px;cursor:pointer;
font-size:13px;font-weight:600}
.tab:hover{background:rgba(255,255,255,.28)}
.tab.on{background:#fff;color:var(--accent2)}
.btn{background:rgba(255,255,255,.16);color:#fff;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px}
.btn:hover{background:rgba(255,255,255,.28)}
.wrap{max-width:1280px;margin:0 auto;padding:18px}
.view{display:none}.view.on{display:block}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:var(--card);border-radius:12px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.07);border-left:4px solid var(--accent)}
.kpi-l{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.6px}
.kpi-v{font-size:26px;font-weight:800;margin-top:3px}
.kpi-s{font-size:12px;color:var(--mut);margin-top:2px}
.card{background:var(--card);border-radius:12px;padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.07);margin-bottom:16px}
.card h2{margin:0 0 12px;font-size:15px;color:var(--accent2)}
.card h3{margin:0 0 8px;font-size:13px;color:var(--ink)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:860px){.grid2{grid-template-columns:1fr}}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:8px 10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
thead th{position:sticky;top:0;background:#fafafa;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--mut);
cursor:pointer;white-space:nowrap;z-index:2}
thead th:hover{color:var(--ink);background:#f1f1f1}
tbody tr:hover{background:#fcfaf7}
.agenda td:first-child{font-weight:700;white-space:nowrap;color:var(--accent2)}
.agenda tbody tr:nth-child(even){background:#fbfbfb}
.tablebox{overflow:auto;max-height:70vh;border-radius:10px;border:1px solid var(--line)}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.toolbar input[type=text],.toolbar select{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff}
.toolbar input[type=text]{min-width:200px}
.toolbar label{font-size:12px;color:var(--mut);display:flex;align-items:center;gap:5px}
.count{font-size:12px;color:var(--mut);margin-left:auto}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.seg button{border:none;background:#fff;padding:8px 12px;cursor:pointer;font-size:13px;color:var(--mut)}
.seg button.on{background:var(--accent);color:#fff;font-weight:600}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-need{background:var(--need);color:#8a6100;border:1px solid var(--needln)}
.b-full{background:var(--std);color:#1f6b3a;border:1px solid var(--stdln)}
.b-acad{background:var(--acad);color:#a8501c;border:1px solid var(--acadln)}
.b-std{background:var(--std);color:#1f6b3a;border:1px solid var(--stdln)}
.b-flag{background:#fde68a;color:#7a5b00;border:1px solid #e0b500}
tr.acad td:first-child{box-shadow:inset 4px 0 0 var(--acadln)}
a.lnk{color:var(--accent2);text-decoration:none}a.lnk:hover{text-decoration:underline}
.small{font-size:12px;color:var(--mut)}
.bar{height:18px;border-radius:6px;display:flex;overflow:hidden;margin:6px 0;font-size:11px;color:#fff;font-weight:600}
.bar .s{background:var(--stdln);display:flex;align-items:center;justify-content:center}
.bar .a{background:var(--acadln);display:flex;align-items:center;justify-content:center}
.teamcard{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:12px}
.teamcard.partial{border-color:var(--needln);background:#fffdf5}
.teamcard h4{margin:0 0 8px;font-size:13px;display:flex;align-items:center;gap:8px}
.member{display:flex;justify-content:space-between;gap:10px;padding:5px 0;border-bottom:1px dashed #eee;font-size:13px}
.member:last-child{border-bottom:none}
.note{background:#fff8ee;border:1px solid #f5d9b0;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px}
ul.fees{margin:6px 0 0;padding-left:18px}ul.fees li{margin:2px 0;font-size:13px}
.foot{text-align:center;color:var(--mut);font-size:12px;padding:18px}
@media print{header.top{position:static}.toolbar,.tabs,.btn,.seg{display:none}.view{display:block!important}
.tablebox{max-height:none;overflow:visible}thead th{position:static}}
</style>
</head>

function e(t,c,h){const x=document.createElement(t);if(c)x.className=c;if(h!=null)x.innerHTML=h;return x;}
function fmt(n){return n==null||n===''?'':Number(n).toLocaleString();}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
const state={};CAMPS.forEach(c=>state[c]={q:'',div:'',team:'',pkg:'',need:false,view:'students',sortKey:'no',sortDir:1});

function kpi(l,v,s){return `<div class="kpi"><div class="kpi-l">${l}</div><div class="kpi-v">${v}</div>${s?`<div class="kpi-s">${s}</div>`:''}</div>`;}
function agendaTable(a){
 let h=`<table class="agenda"><thead><tr>${a.cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>`;
 a.rows.forEach(r=>{h+=`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`;});
 return h+'</tbody></table>';
}
function pkgBar(s){const tot=s.std+s.acad;const sp=Math.round(s.std/tot*100);
 return `<div class="bar"><div class="s" style="width:${sp}%">${s.std} Standard</div><div class="a" style="width:${100-sp}%">${s.acad} Academic</div></div>`;}

const COLS=[
 ['no','#'],['team','Team'],['division','Division'],['name','Student'],['grade','Grade'],['school','School'],
 ['country','Country'],['cameWith','Came'],['pkgType','Package'],['contact','Contact'],
 ['others','Others in booking'],['notes','Notes']];

function rec_name(r){return r.first+' '+r.last;}
function filt(c){
 const s=state[c];let rows=D.camps[c].slice();
 if(s.q){const q=s.q.toLowerCase();rows=rows.filter(r=>(rec_name(r)+' '+r.school+' '+r.team+' '+r.booking+' '+r.others+' '+r.email+' '+r.phone).toLowerCase().includes(q));}
 if(s.div)rows=rows.filter(r=>r.division===s.div);
 if(s.team)rows=rows.filter(r=>r.team===s.team);
 if(s.pkg)rows=rows.filter(r=>r.pkgType===s.pkg);
 if(s.need)rows=rows.filter(r=>r.need>0);
 const k=s.sortKey;rows.sort((a,b)=>{let x,y;
  if(k=='name'){x=a.last;y=b.last;}else if(k=='contact'){x=a.phone;y=b.phone;}else{x=a[k];y=b[k];}
  x=x==null?'':x;y=y==null?'':y;
  if(typeof x==='number'&&typeof y==='number')return (x-y)*s.sortDir;
  return String(x).localeCompare(String(y))*s.sortDir;});
 return rows;
}

function pkgBadge(r){const cl=r.pkgType.startsWith('Academic')?'b-acad':'b-std';
 const lbl=r.pkgType.startsWith('Academic')?'Academic only':'Standard';
 return `<span class="badge ${cl}">${lbl}</span><div class="small">${esc(r.pkg)}</div>`;}
function contactCell(r){let h='';
 if(r.email)h+=`<a class="lnk" href="mailto:${esc(r.email)}">${esc(r.email)}</a><br>`;
 if(r.phone)h+=`<a class="lnk" href="tel:${esc(String(r.phone).replace(/[^0-9+]/g,''))}">${esc(r.phone)}</a>`;
 return h;}

 rows.forEach(r=>{

  h+=`<tr class="${acad?'acad':''}">
   <td>${r.no}</td>
   <td>${esc(r.team.replace(/\(.*?\)/,'').trim())} ${teamBadge(r)}<div class="small">${esc(r.team.match(/\((.*?)\)/)?r.division:'')}</div></td>
   <td>${esc(r.division)}</td>
   <td><b>${esc(rec_name(r))}</b>${r.notes?`<br><span class="badge b-flag">${esc(r.notes)}</span>`:''}</td>
   <td>${esc(r.grade)}</td>
   <td>${esc(r.school)}</td>
   <td>${esc(r.country)}</td>
   <td>${r.cameWith}<div class="small">${r.nStu}S · ${r.nAd}A</div></td>
   <td>${pkgBadge(r)}</td>
   <td>${contactCell(r)}</td>
   <td class="small">${esc(r.others)}</td>
   <td class="small">${esc(r.notes)}</td></tr>`;
 });
 h+='</tbody></table>';
 const box=document.querySelector(`#v-${c} .tablebox`);box.innerHTML=h;
 box.querySelectorAll('th').forEach(th=>th.onclick=()=>{const k=th.dataset.k;
  if(s.sortKey===k)s.sortDir*=-1;else{s.sortKey=k;s.sortDir=1;}render(c);});
 document.querySelector(`#v-${c} .count`).textContent=`Showing ${rows.length} of ${D.camps[c].length} students`;
}
function renderTeams(c){
 const rows=filt(c);const groups={};
 rows.forEach(r=>{(groups[r.team]=groups[r.team]||[]).push(r);});
 let h='';
 Object.keys(groups).sort().forEach(t=>{
  const m=groups[t];const need=m[0].need;
  h+=`<div class="teamcard ${need>0?'partial':''}"><h4>${esc(t)} ${teamBadge(m[0])}</h4>`;
  m.forEach(r=>{h+=`<div class="member"><span>${esc(rec_name(r))} <span class="small">· ${esc(r.grade)}</span>${r.notes?` <span class="badge b-flag">${esc(r.notes)}</span>`:''}</span>
   <span class="badge ${r.pkgType.startsWith('Academic')?'b-acad':'b-std'}">${r.pkgType.startsWith('Academic')?'Acad':'Std'}</span></div>`;});
  h+='</div>';
 });
 const box=document.querySelector(`#v-${c} .tablebox`);box.innerHTML=h||'<div class="small">No teams match.</div>';
 document.querySelector(`#v-${c} .count`).textContent=`Showing ${rows.length} students in ${Object.keys(groups).length} teams`;
}
function render(c){state[c].view==='teams'?renderTeams(c):renderTable(c);
 document.querySelectorAll(`#v-${c} .seg button`).forEach(b=>b.classList.toggle('on',b.dataset.v===state[c].view));}

function buildCamp(c){
 const s=D.summary[c];
 const divs=[...new Set(D.camps[c].map(r=>r.division))];
 const teams=[...new Set(D.camps[c].map(r=>r.team))];
 let html=`<div class="note"><b>Action flags:</b> ${s.need} team(s) still need members · ${s.acad} families are <b>Academic only</b> (no hotel / no airport transfer — do not arrange lodging or pickup).</div>`;
 html+=`<div class="kpis">
  ${kpi('Families',s.families,esc(s.dates))}${kpi('Students',s.students,'')}${kpi('Adults',s.adults,'accompanying')}
  ${kpi('Total people',s.people,'')}${kpi('Teams',s.teams,s.full+' full · '+s.need+' need')}${kpi('Academic-only',s.acad,'no hotel')}</div>`;
 html+=`<div class="card"><h2>${D.agendas[c].title}</h2>${agendaTable(D.agendas[c])}</div>`;
 html+=`<div class="card"><h2>Roster — students, families, teams, packages, contacts</h2>
  <div class="toolbar">
   <input type="text" placeholder="🔍 search name / school / team / contact…" data-f="q">
   <select data-f="div"><option value="">All divisions</option>${divs.map(d=>`<option>${esc(d)}</option>`).join('')}</select>
   <select data-f="team"><option value="">All teams</option>${teams.map(t=>`<option>${esc(t)}</option>`).join('')}</select>
   <select data-f="pkg"><option value="">All packages</option><option>Standard (hotel + transport)</option><option>Academic only (no hotel)</option></select>
   <label><input type="checkbox" data-f="need"> needs members only</label>
   <span class="seg"><button data-v="students" class="on">By student</button><button data-v="teams">By team</button></span>
   <span class="count"></span>
  </div>
  <div class="tablebox"></div></div>`;
 const root=document.getElementById('v-'+c);root.innerHTML=html;
 root.querySelector('[data-f="q"]').addEventListener('input',ev=>{state[c].q=ev.target.value;render(c);});
 root.querySelector('[data-f="div"]').addEventListener('change',ev=>{state[c].div=ev.target.value;render(c);});
 root.querySelector('[data-f="team"]').addEventListener('change',ev=>{state[c].team=ev.target.value;render(c);});
 root.querySelector('[data-f="pkg"]').addEventListener('change',ev=>{state[c].pkg=ev.target.value;render(c);});
 root.querySelector('[data-f="need"]').addEventListener('change',ev=>{state[c].need=ev.target.checked;render(c);});
 root.querySelectorAll('.seg button').forEach(b=>b.onclick=()=>{state[c].view=b.dataset.v;render(c);});
 render(c);
}
function show(v){active=v;document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
 document.getElementById('v-'+v).classList.add('on');
 document.querySelectorAll('#tabs .tab').forEach(t=>t.classList.toggle('on',t.dataset.v===v));}
function init(){
 const tabs=document.getElementById('tabs');
 [['overview','Overview'],['G1-G3','G1–G3 Team'],['G4-G8','G4–G8 Team']].forEach(([v,l])=>{
  const b=e('button','tab',l);b.dataset.v=v;b.onclick=()=>show(v);tabs.appendChild(b);});
 buildOverview();CAMPS.forEach(buildCamp);show('overview');
}
init();
</script>
</body></html>
